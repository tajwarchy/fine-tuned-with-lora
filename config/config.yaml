# ──────────────────────────────────────────────
# Model
# ──────────────────────────────────────────────
model:
  base_model_id: "meta-llama/Llama-3.2-3B"   # swap to mistralai/Mistral-7B-v0.1 if preferred
  model_version: "v1"                          # overridden by MODEL_VERSION env var at runtime

# ──────────────────────────────────────────────
# LoRA
# ──────────────────────────────────────────────
lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# ──────────────────────────────────────────────
# Quantization
# ──────────────────────────────────────────────
quantization:
  load_in_4bit: false        # 4-bit (bitsandbytes) is CUDA-only — not supported on M1
  load_in_fp16: true         # we load in float16 on CPU/MPS instead
  use_bnb: false             # bitsandbytes installed but not used for quantization

# ──────────────────────────────────────────────
# Dataset
# ──────────────────────────────────────────────
dataset:
  hf_dataset_id: "iamtarun/python_code_instructions_18k_alpaca"
  split: "train"
  eval_ratio: 0.10
  max_length: 512
  num_workers: 0

# ──────────────────────────────────────────────
# Training
# ──────────────────────────────────────────────
training:
  output_dir: "outputs/adapter"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.001
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  fp16: false
  bf16: false
  dataloader_num_workers: 0
  device: "cpu"

# ──────────────────────────────────────────────
# Inference
# ──────────────────────────────────────────────
inference:
  device: "mps"
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

# ──────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────
paths:
  adapter_dir: "outputs/adapter"
  merged_model_dir: "outputs/merged_model"
  eval_results_dir: "evaluation/results"
  request_log_dir: "logs/requests"

# ──────────────────────────────────────────────
# MLflow
# ──────────────────────────────────────────────
mlflow:
  tracking_uri: "http://127.0.0.1:5000"
  experiment_name: "lora-finetune"
  registered_model_name: "domain-llm"

# ──────────────────────────────────────────────
# FastAPI
# ──────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"